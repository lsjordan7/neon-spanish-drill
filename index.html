<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05010f">
<title>NEÓN // Spanish Drill — A1 → C2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05010f;
  --bg-2:#0a0420;
  --grid:rgba(0,240,255,0.06);
  --panel:rgba(16,4,40,0.72);
  --panel-edge:rgba(0,240,255,0.35);
  --text:#e6f7ff;
  --text-soft:#9ab8c8;
  --text-dim:#5a6f7d;
  --cyan:#00f0ff;
  --magenta:#ff2bd6;
  --purple:#9d3cff;
  --yellow:#fff200;
  --red:#ff3860;
  --green:#39ff88;
  --orange:#ff9b3c;
  --shadow-cyan:0 0 18px rgba(0,240,255,.45), 0 0 38px rgba(0,240,255,.18);
  --shadow-mag:0 0 18px rgba(255,43,214,.55), 0 0 42px rgba(255,43,214,.18);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Rajdhani', 'Share Tech Mono', system-ui, sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  overscroll-behavior:none;
  position:relative;
}

/* — global atmospherics — */
body::before{
  content:"";
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(157,60,255,.35), transparent 60%),
    radial-gradient(ellipse 80% 60% at 100% 110%, rgba(255,43,214,.25), transparent 60%),
    radial-gradient(ellipse 60% 50% at 60% 50%, rgba(0,240,255,.08), transparent 70%);
  pointer-events:none; z-index:0;
}
body::after{
  content:"";
  position:fixed; inset:0;
  background:
    linear-gradient(var(--grid) 1px, transparent 1px) 0 0/40px 40px,
    linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/40px 40px;
  mask-image:radial-gradient(ellipse at center, black 40%, transparent 85%);
  pointer-events:none; z-index:0;
  animation:gridDrift 60s linear infinite;
}
@keyframes gridDrift{
  from{background-position:0 0, 0 0;}
  to{background-position:40px 40px, 40px 40px;}
}
/* scanlines */
.scanlines{
  position:fixed; inset:0; pointer-events:none; z-index:50;
  background:repeating-linear-gradient(
    0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px,
    rgba(0,240,255,.025) 3px, rgba(0,240,255,.025) 3px);
  mix-blend-mode:overlay;
}

h1,h2,h3,h4,.heading{
  font-family:'Orbitron', 'Share Tech Mono', monospace;
  font-weight:700;
  letter-spacing:.04em;
  margin:0;
  text-transform:uppercase;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}

.app{
  position:relative; z-index:1;
  display:flex; flex-direction:column; height:100dvh;
  max-width:780px; margin:0 auto;
}

/* — top bar — */
.appbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid rgba(0,240,255,.18);
  background:linear-gradient(180deg, rgba(5,1,15,.85), rgba(5,1,15,.55));
  backdrop-filter:blur(6px);
  position:sticky; top:0; z-index:10;
}
.appbar .left{display:flex; align-items:center; gap:12px; min-width:0;}
.brand{
  font-family:'Orbitron', monospace; font-weight:800;
  font-size:18px; letter-spacing:.18em;
  color:var(--cyan);
  text-shadow:0 0 6px rgba(0,240,255,.55), 0 0 18px rgba(0,240,255,.25);
}
.brand .slash{color:var(--magenta); text-shadow:0 0 6px rgba(255,43,214,.7);}
.brand-sub{
  font-family:'Share Tech Mono', monospace;
  color:var(--text-soft); font-size:11px; letter-spacing:.2em;
  text-transform:uppercase;
}
.icon-btn{
  width:40px; height:40px; border-radius:6px;
  border:1px solid rgba(0,240,255,.35);
  background:rgba(0,240,255,.04);
  display:inline-flex; align-items:center; justify-content:center;
  color:var(--cyan);
  transition:background .15s, transform .15s, box-shadow .2s, border-color .15s;
  flex-shrink:0;
  clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
.icon-btn:hover{
  background:rgba(0,240,255,.12);
  border-color:var(--cyan);
  box-shadow:var(--shadow-cyan);
}
.icon-btn:active{transform:scale(.95);}
.icon-btn svg{width:18px; height:18px; stroke-width:2;}

main{
  flex:1; overflow-y:auto;
  padding:18px 18px 28px;
  scroll-behavior:smooth;
}
main::-webkit-scrollbar{width:6px;}
main::-webkit-scrollbar-thumb{background:rgba(0,240,255,.3); border-radius:6px;}

/* — home — */
.hero{
  margin:4px 0 18px;
  padding:18px 4px 4px;
}
.hero h2{
  font-size:30px;
  background:linear-gradient(90deg, var(--cyan), var(--magenta) 55%, var(--purple));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 0 8px rgba(255,43,214,.35));
  position:relative;
}
.hero .lead{
  color:var(--text-soft); margin:6px 0 0;
  font-family:'Share Tech Mono', monospace; font-size:13px; letter-spacing:.06em;
}
.hero .lead .blink{
  color:var(--cyan);
  animation:blink 1.2s steps(2,start) infinite;
}
@keyframes blink{to{visibility:hidden;}}

.section-label{
  display:flex; align-items:center; gap:10px;
  font-family:'Orbitron', monospace; font-size:11px; letter-spacing:.32em;
  color:var(--cyan); text-transform:uppercase;
  margin:22px 4px 12px;
}
.section-label::before{
  content:""; width:14px; height:2px;
  background:linear-gradient(90deg, var(--cyan), transparent);
}
.section-label::after{
  content:""; flex:1; height:1px;
  background:linear-gradient(90deg, rgba(0,240,255,.4), transparent);
}

.levels{
  display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;
}
@media (max-width:520px){
  .levels{grid-template-columns:repeat(2, 1fr);}
}
.level-card{
  position:relative;
  border:1px solid rgba(0,240,255,.25);
  background:linear-gradient(160deg, rgba(16,4,40,.85), rgba(8,2,24,.7));
  padding:14px 14px 12px;
  text-align:left;
  color:var(--text);
  clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  transition:transform .15s, border-color .2s, box-shadow .25s;
}
.level-card:hover{
  border-color:var(--cyan);
  box-shadow:var(--shadow-cyan);
  transform:translateY(-1px);
}
.level-card.active{
  border-color:var(--magenta);
  box-shadow:var(--shadow-mag);
}
.level-tag{
  font-family:'Orbitron', monospace; font-size:22px; font-weight:800;
  letter-spacing:.06em;
  color:var(--cyan);
  text-shadow:0 0 8px rgba(0,240,255,.55);
}
.level-card.active .level-tag{color:var(--magenta); text-shadow:0 0 8px rgba(255,43,214,.7);}
.level-name{
  font-family:'Share Tech Mono', monospace;
  color:var(--text-soft); font-size:11px; letter-spacing:.16em;
  text-transform:uppercase; margin-top:2px;
}
.level-meta{
  color:var(--text-dim); font-size:11px; margin-top:6px;
  font-family:'Share Tech Mono', monospace;
}

.cat-grid{
  display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;
  margin-top:6px;
}
@media (max-width:520px){
  .cat-grid{grid-template-columns:1fr;}
}
.cat-card{
  position:relative; text-align:left;
  padding:18px 16px;
  border:1px solid rgba(157,60,255,.35);
  background:linear-gradient(160deg, rgba(28,8,60,.8), rgba(10,2,30,.85));
  clip-path:polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  color:var(--text);
  transition:transform .15s, border-color .2s, box-shadow .25s;
  overflow:hidden;
}
.cat-card::before{
  content:""; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, var(--cyan), var(--magenta));
  opacity:.55;
}
.cat-card:hover{
  transform:translateY(-2px);
  border-color:var(--magenta);
  box-shadow:var(--shadow-mag);
}
.cat-card .ico{
  font-family:'Orbitron', monospace; color:var(--magenta);
  font-size:11px; letter-spacing:.28em;
}
.cat-card h3{
  font-size:22px; margin-top:4px;
  color:var(--text);
  text-shadow:0 0 10px rgba(255,43,214,.25);
}
.cat-card .desc{
  margin-top:6px; font-size:13px; color:var(--text-soft);
  font-family:'Share Tech Mono', monospace; line-height:1.45;
}
.cat-card .stats{
  margin-top:10px;
  display:flex; justify-content:space-between; align-items:center;
  font-family:'Share Tech Mono', monospace; font-size:11px;
  color:var(--text-dim); letter-spacing:.08em;
}
.cat-card .stats .done{color:var(--green);}
.progress-bar{
  margin-top:8px; height:4px; width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(0,240,255,.18);
  overflow:hidden;
}
.progress-bar > i{
  display:block; height:100%; width:0%;
  background:linear-gradient(90deg, var(--cyan), var(--magenta));
  box-shadow:0 0 8px rgba(0,240,255,.5);
}

/* — study screen — */
.study{
  display:flex; flex-direction:column; gap:18px;
  height:100%;
  padding-top:4px;
}
.crumb{
  display:flex; align-items:center; gap:12px;
  font-family:'Share Tech Mono', monospace; font-size:12px; letter-spacing:.14em;
  color:var(--text-soft); text-transform:uppercase;
}
.crumb .pill{
  padding:4px 10px; border:1px solid rgba(0,240,255,.4); color:var(--cyan);
  clip-path:polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
  text-shadow:0 0 6px rgba(0,240,255,.4);
}
.crumb .pill.m{border-color:rgba(255,43,214,.5); color:var(--magenta); text-shadow:0 0 6px rgba(255,43,214,.5);}

.deckhead{
  display:flex; justify-content:space-between; align-items:center;
  font-family:'Share Tech Mono', monospace; font-size:12px;
  color:var(--text-soft); letter-spacing:.1em;
}
.deckhead .count{color:var(--cyan); text-shadow:0 0 6px rgba(0,240,255,.5);}

.stage{
  position:relative; flex:1;
  display:flex; align-items:center; justify-content:center;
  min-height:330px;
  perspective:1400px;
}

.card{
  position:relative;
  width:min(94%, 480px);
  aspect-ratio: 3 / 4.2;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.2,.8,.2,1), opacity .25s;
  user-select:none;
  touch-action:pan-y;
}
.card.flipped{transform:rotateY(180deg);}

.face{
  position:absolute; inset:0;
  border:1px solid rgba(0,240,255,.4);
  background:
    linear-gradient(155deg, rgba(20,4,50,.92), rgba(6,2,22,.95));
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex; flex-direction:column; padding:24px 22px;
  clip-path:polygon(0 0, calc(100% - 26px) 0, 100% 26px, 100% 100%, 26px 100%, 0 calc(100% - 26px));
  box-shadow:0 0 0 1px rgba(255,43,214,.06) inset,
             0 20px 50px rgba(0,0,0,.55),
             0 0 40px rgba(0,240,255,.12);
  overflow:hidden;
}
.face::before{
  content:""; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--cyan), var(--magenta));
  opacity:.7;
}
.face::after{
  content:""; position:absolute; bottom:0; right:0;
  width:80px; height:80px;
  background:radial-gradient(circle at 100% 100%, rgba(255,43,214,.22), transparent 70%);
  pointer-events:none;
}
.face.back{
  transform:rotateY(180deg);
  border-color:rgba(255,43,214,.45);
}
.face.back::before{background:linear-gradient(90deg, var(--magenta), var(--purple));}

.face .meta{
  display:flex; justify-content:space-between; align-items:center;
  font-family:'Share Tech Mono', monospace; font-size:11px;
  color:var(--text-dim); letter-spacing:.18em; text-transform:uppercase;
}
.face .meta .id{color:var(--cyan);}
.face .meta .gender{
  padding:2px 8px; border:1px solid rgba(0,240,255,.35); color:var(--cyan);
  font-size:10px;
}
.face .meta .gender.f{border-color:rgba(255,43,214,.45); color:var(--magenta);}

.face .word-wrap{
  flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
  text-align:center; padding:8px 4px;
  gap:14px;
}
.face .word{
  font-family:'Orbitron', monospace;
  font-weight:700;
  font-size:clamp(28px, 7vw, 44px);
  letter-spacing:.01em;
  color:var(--text);
  text-shadow:0 0 14px rgba(0,240,255,.45), 0 0 26px rgba(0,240,255,.15);
  line-height:1.1;
  word-break:break-word;
}
.face.back .word{
  text-shadow:0 0 14px rgba(255,43,214,.5), 0 0 28px rgba(255,43,214,.18);
  font-size:clamp(24px, 6vw, 38px);
}
.face .pron{
  font-family:'Share Tech Mono', monospace;
  color:var(--text-soft); font-size:13px; letter-spacing:.08em;
}
.face .hint{
  font-family:'Share Tech Mono', monospace;
  position:absolute; bottom:18px; left:0; right:0; text-align:center;
  color:var(--text-dim); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
}

.speak{
  position:absolute; top:18px; right:18px;
  width:46px; height:46px;
  border:1px solid var(--cyan);
  background:rgba(0,240,255,.08);
  color:var(--cyan);
  display:inline-flex; align-items:center; justify-content:center;
  transition:background .15s, transform .15s, box-shadow .2s;
  clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  box-shadow:0 0 14px rgba(0,240,255,.3);
  z-index:3;
}
.speak:hover{background:rgba(0,240,255,.2); box-shadow:var(--shadow-cyan);}
.speak:active{transform:scale(.94);}
.speak.playing{animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{
  0%,100%{box-shadow:0 0 14px rgba(0,240,255,.4);}
  50%{box-shadow:0 0 28px rgba(0,240,255,.85), 0 0 60px rgba(0,240,255,.3);}
}

/* conjugation table on verb back */
.conj{
  display:grid; grid-template-columns:auto 1fr; row-gap:5px; column-gap:12px;
  font-family:'Share Tech Mono', monospace;
  width:100%; max-width:300px;
  font-size:14px;
}
.conj .pn{color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; font-size:11px; text-align:right;}
.conj .form{color:var(--text);}
.conj .form b{color:var(--magenta);}

/* phrase formatting */
.face .phrase-en{
  font-size:clamp(18px, 4.5vw, 24px);
  color:var(--text);
  font-family:'Rajdhani', sans-serif; font-weight:600;
  text-shadow:0 0 12px rgba(255,43,214,.4);
  line-height:1.3;
}
.face .phrase-note{
  color:var(--text-soft); font-size:12px; margin-top:8px;
  font-family:'Share Tech Mono', monospace; letter-spacing:.06em;
}

/* — action buttons (know / don't know / flip) — */
.actions{
  display:grid; grid-template-columns:1fr auto 1fr; gap:10px;
  align-items:center;
  padding:8px 6px 14px;
}
.btn{
  font-family:'Orbitron', monospace; font-weight:600;
  font-size:13px; letter-spacing:.18em; text-transform:uppercase;
  padding:14px 16px;
  border:1px solid var(--cyan);
  background:rgba(0,240,255,.06);
  color:var(--cyan);
  clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  transition:background .15s, transform .15s, box-shadow .2s;
  text-shadow:0 0 8px rgba(0,240,255,.4);
}
.btn:hover{background:rgba(0,240,255,.15); box-shadow:var(--shadow-cyan);}
.btn:active{transform:scale(.97);}
.btn.fail{border-color:var(--red); color:var(--red); text-shadow:0 0 8px rgba(255,56,96,.4); background:rgba(255,56,96,.06);}
.btn.fail:hover{background:rgba(255,56,96,.14); box-shadow:0 0 18px rgba(255,56,96,.45);}
.btn.pass{border-color:var(--green); color:var(--green); text-shadow:0 0 8px rgba(57,255,136,.4); background:rgba(57,255,136,.06);}
.btn.pass:hover{background:rgba(57,255,136,.14); box-shadow:0 0 18px rgba(57,255,136,.45);}
.btn.flip{
  border-color:var(--magenta); color:var(--magenta); text-shadow:0 0 8px rgba(255,43,214,.4);
  background:rgba(255,43,214,.06); padding:14px 22px;
}
.btn.flip:hover{background:rgba(255,43,214,.18); box-shadow:var(--shadow-mag);}

/* swipe hints */
.swipe-hint{
  position:absolute; top:50%; transform:translateY(-50%);
  font-family:'Orbitron', monospace; font-size:11px; letter-spacing:.3em;
  color:var(--text-dim); text-transform:uppercase;
  opacity:.55; pointer-events:none;
  writing-mode:vertical-rl; text-orientation:mixed;
}
.swipe-hint.left{left:6px; color:var(--red);}
.swipe-hint.right{right:6px; color:var(--green);}
@media (max-width:520px){.swipe-hint{display:none;}}

/* glitch on title transition */
.glitch{position:relative; display:inline-block;}
.glitch::before, .glitch::after{
  content:attr(data-text);
  position:absolute; left:0; top:0; width:100%;
  background:transparent;
  overflow:hidden;
  pointer-events:none;
}
.glitch::before{color:var(--cyan); transform:translate(-2px, 0); mix-blend-mode:screen; clip-path:inset(0 0 60% 0);}
.glitch::after{color:var(--magenta); transform:translate(2px, 0); mix-blend-mode:screen; clip-path:inset(60% 0 0 0);}

/* — toast — */
.toast{
  position:fixed; left:50%; bottom:80px; transform:translate(-50%, 12px);
  font-family:'Share Tech Mono', monospace; font-size:12px; letter-spacing:.16em;
  padding:10px 16px; color:var(--cyan); text-transform:uppercase;
  border:1px solid var(--cyan);
  background:rgba(0,240,255,.08);
  opacity:0; transition:opacity .25s, transform .25s;
  pointer-events:none; z-index:60;
  clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  box-shadow:var(--shadow-cyan);
}
.toast.show{opacity:1; transform:translate(-50%, 0);}
.toast.fail{color:var(--red); border-color:var(--red); background:rgba(255,56,96,.08); box-shadow:0 0 18px rgba(255,56,96,.4);}
.toast.pass{color:var(--green); border-color:var(--green); background:rgba(57,255,136,.08); box-shadow:0 0 18px rgba(57,255,136,.4);}

/* completed view */
.done{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; gap:14px; padding:40px 20px;
}
.done h3{
  font-size:32px;
  background:linear-gradient(90deg, var(--cyan), var(--magenta));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.done p{color:var(--text-soft); font-family:'Share Tech Mono', monospace; letter-spacing:.06em; max-width:380px; line-height:1.5;}

/* modal */
.backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
  z-index:100; display:none; align-items:center; justify-content:center; padding:20px;
}
.backdrop.show{display:flex;}
.modal{
  width:min(420px, 100%);
  background:linear-gradient(160deg, rgba(20,4,50,.97), rgba(6,2,22,.98));
  border:1px solid var(--cyan);
  box-shadow:var(--shadow-cyan);
  padding:24px 22px;
  clip-path:polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
}
.modal h3{font-size:18px; color:var(--cyan); margin-bottom:14px; text-shadow:0 0 8px rgba(0,240,255,.4);}
.modal .row{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
.modal label{font-family:'Share Tech Mono', monospace; font-size:11px; color:var(--text-soft); letter-spacing:.18em; text-transform:uppercase;}
.modal select, .modal input[type=range]{
  background:rgba(0,240,255,.06);
  border:1px solid rgba(0,240,255,.4);
  color:var(--text);
  padding:8px 10px;
  font-family:'Share Tech Mono', monospace; font-size:13px;
  outline:none;
}
.modal input[type=range]{accent-color:var(--magenta); padding:0;}
.modal .modal-actions{display:flex; gap:10px; justify-content:flex-end;}
.modal .btn{padding:10px 16px; font-size:12px;}

/* hidden */
.hidden{display:none !important;}
</style>
</head>
<body>
<div class="scanlines"></div>

<div class="app">
  <!-- Top bar -->
  <header class="appbar">

/* ---------- Audio helpers ---------- */

function normalize(s){
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
}

const AUDIO_BASE = "./audio/words/";
const audioCache = {};
const audio404 = new Set();

function tryAudioFile(word){
  return new Promise((resolve) => {
    const key = normalize(word);
    if(audio404.has(key)){ resolve(false); return; }
    if(audioCache[key]){
      const a = audioCache[key];
      a.currentTime = 0;
      a.play().then(()=>resolve(true)).catch(()=>{ audio404.add(key); resolve(false); });
      return;
    }
    const a = new Audio(AUDIO_BASE + key + ".mp3");
    a.addEventListener('error', () => { audio404.add(key); resolve(false); }, {once:true});
    a.addEventListener('canplay', () => { audioCache[key] = a; }, {once:true});
    a.play().then(()=>resolve(true)).catch(()=>{ audio404.add(key); resolve(false); });
  });
}

const safeStore = (() => {
  let mem = {};
  try {
    if(window.localStorage){
      window.localStorage.setItem('__neon_probe__','1');
      window.localStorage.removeItem('__neon_probe__');
      return window.localStorage;
    }
  } catch { /* file://, sandboxed, or quota */ }
  return {
    getItem: (k) => mem[k] ?? null,
    setItem: (k, v) => { mem[k] = String(v); },
    removeItem: (k) => { delete mem[k]; },
  };
})();

let voices = [];
let chosenVoiceURI = safeStore.getItem('neon-voice') || '';
let speechRate = parseFloat(safeStore.getItem('neon-rate') || '0.95');

function loadVoices(){
  voices = (window.speechSynthesis?.getVoices() || []).filter(v => v.lang && v.lang.toLowerCase().startsWith('es'));
  // prefer Spain voices
  voices.sort((a,b) => {
    const aEs = a.lang.toLowerCase().includes('es-es');
    const bEs = b.lang.toLowerCase().includes('es-es');
    if(aEs && !bEs) return -1;
    if(bEs && !aEs) return 1;
    return a.name.localeCompare(b.name);
  });
}
if(window.speechSynthesis){
  loadVoices();
  window.speechSynthesis.addEventListener?.('voiceschanged', loadVoices);
}

function ttsSpeak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.rate = speechRate;
  if(chosenVoiceURI){
    const v = voices.find(v => v.voiceURI === chosenVoiceURI);
    if(v) u.voice = v;
  } else {
    const spain = voices.find(v => v.lang.toLowerCase().includes('es-es'));
    if(spain) u.voice = spain;
  }
  window.speechSynthesis.speak(u);
}

async function speak(text){
  // Always prefer a prerecorded MP3 so the voice is consistent;
  // fall back to device TTS only if no MP3 exists for this string.
  const ok = await tryAudioFile(text);
  if(ok) return;
  ttsSpeak(text);
}

const PROGRESS_KEY = 'neon-progress-v1';
function loadProgress(){
  try { return JSON.parse(safeStore.getItem(PROGRESS_KEY) || '{}'); }
  catch { return {}; }
}
function saveProgress(p){
  try { safeStore.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch {}
}
let progress = loadProgress();

function deckId(level, cat){ return level + '/' + cat; }
function getDeckState(level, cat){
  const id = deckId(level, cat);
  if(!progress[id]) progress[id] = { boxes:{}, completed:0, total:0 };
  return progress[id];
}
function itemId(level, cat, item){
  if(cat === 'phrases') return level + ':p:' + (item.s);
  if(cat === 'verbs')   return level + ':v:' + (item.i);
  return level + ':n:' + (item.w);
}

/* ---------- Routing / rendering ---------- */

const main = document.getElementById('main');
const appSub = document.getElementById('appSub');
const backBtn = document.getElementById('backBtn');
const settingsBtn = document.getElementById('settingsBtn');
const toastEl = document.getElementById('toast');

let route = { name:'home' }; // {name:'study', level, cat, queue, idx, flipped, sessionDone}

function navigate(r){
  route = r;
  if(route.name === 'home'){
    backBtn.style.display = 'none';
    appSub.textContent = 'A1 → C2 · ESPAÑA';
  } else if(route.themeKey){
    backBtn.style.display = '';
    const d = DECKS[route.themeKey];
    appSub.textContent = (d?.badge || 'MEM') + ' · ' + (d?.en || '').toUpperCase();
  } else {
    backBtn.style.display = '';
    appSub.textContent = route.level + ' · ' + (CATS.find(c=>c.key===route.cat)?.en || '').toUpperCase();
  }
  render();
}

backBtn.onclick = () => navigate({name:'home'});

function showToast(msg, cls){
  toastEl.textContent = msg;
  toastEl.className = 'toast' + (cls? ' '+cls : '');
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> toastEl.classList.remove('show'), 1100);
}

function render(){
  if(route.name === 'home') renderHome();
  else if(route.name === 'study') renderStudy();
}

function renderHome(){
  const levels = Object.keys(VOCAB);
  let html = `
    <section class="hero">
      <h2><span class="glitch" data-text="DRILL // ESPAÑOL">DRILL // ESPAÑOL</span></h2>
      <p class="lead">// initialising deck protocol<span class="blink">_</span></p>
    </section>

    <div class="section-label">Select level</div>
    <div class="levels">
      ${levels.map(L => {
        const total = CATS.reduce((s,c) => s + (VOCAB[L][c.key]?.length||0), 0);
        const learned = CATS.reduce((s,c) => {
          const st = getDeckState(L, c.key);
          return s + Object.values(st.boxes).filter(b=>b>=3).length;
        }, 0);
        const cls = (route._selectedLevel === L) ? ' active' : '';
        return `
          <button class="level-card${cls}" data-level="${L}">
            <div class="level-tag">${L}</div>
            <div class="level-name">${L === 'A1' ? 'Beginner' : L === 'A2' ? 'Elementary' : L === 'B1' ? 'Intermediate' : L === 'B2' ? 'Upper-Int.' : L === 'C1' ? 'Advanced' : 'Mastery'}</div>
            <div class="level-meta">${learned}/${total} drilled</div>
          </button>`;
      }).join('')}
    </div>
  `;

  const sel = route._selectedLevel || 'A1';
  html += `
    <div class="section-label" style="margin-top:28px;">${sel} · ${LEVEL_DESC[sel]}</div>
    <div class="cat-grid">
      ${CATS.map(c => {
        const items = VOCAB[sel][c.key] || [];
        const st = getDeckState(sel, c.key);
        const learned = Object.values(st.boxes).filter(b=>b>=3).length;
        const pct = items.length ? Math.round(learned/items.length*100) : 0;
        return `
          <button class="cat-card" data-cat="${c.key}">
            <div class="ico">// ${c.en.toUpperCase()}</div>
            <h3>${c.label}</h3>
            <div class="desc">${c.blurb}</div>
            <div class="stats">
              <span>${items.length} cards</span>
              <span class="done">${pct}% drilled</span>
            </div>
            <div class="progress-bar"><i style="width:${pct}%"></i></div>
          </button>`;
      }).join('')}
    </div>
  `;

  // Themed memorization decks
  const themeKeys = Object.keys(DECKS);
  html += `
    <div class="section-label" style="margin-top:28px;">// Memorizar · personal decks</div>
    <div class="cat-grid">
      ${themeKeys.map(k => {
        const d = DECKS[k];
        const st = getDeckState('THEME', k);
        const learned = Object.values(st.boxes).filter(b=>b>=3).length;
        const pct = d.cards.length ? Math.round(learned/d.cards.length*100) : 0;
        return `
          <button class="cat-card theme" data-theme="${k}">
            <div class="ico">// ${d.en.toUpperCase()} · ${d.badge}</div>
            <h3>${d.title}</h3>
            <div class="desc">${d.blurb}</div>
            <div class="stats">
              <span>${d.cards.length} cards</span>
              <span class="done">${pct}% drilled</span>
            </div>
            <div class="progress-bar"><i style="width:${pct}%"></i></div>
          </button>`;
      }).join('')}
    </div>
  `;

  main.innerHTML = html;

  main.querySelectorAll('.level-card').forEach(btn => {
    btn.addEventListener('click', () => {
      route._selectedLevel = btn.dataset.level;
      render();
      // scroll to category section
      setTimeout(()=>{
        const grid = main.querySelector('.cat-grid');
        grid?.scrollIntoView({behavior:'smooth', block:'nearest'});
      }, 50);
    });
  });
  main.querySelectorAll('.cat-card[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      startStudy(route._selectedLevel || 'A1', btn.dataset.cat);
    });
  });
  main.querySelectorAll('.cat-card[data-theme]').forEach(btn => {
    btn.addEventListener('click', () => {
      startTheme(btn.dataset.theme);
    });
  });
}

function startTheme(themeKey){
  const deck = DECKS[themeKey];
  if(!deck) return;
  const state = getDeckState('THEME', themeKey);
  const queue = deck.cards.slice().sort((a,b) => {
    const ka = themeItemId(themeKey, a), kb = themeItemId(themeKey, b);
    const ba = state.boxes[ka] ?? 0, bb = state.boxes[kb] ?? 0;
    return ba - bb;
  });
  navigate({name:'study', themeKey, queue, idx:0, flipped:false});
}

function themeItemId(themeKey, item){
  return 'THEME:' + themeKey + ':' + item.s;
}

function startStudy(level, cat){
  const items = VOCAB[level][cat].slice();
  const state = getDeckState(level, cat);
  // sort: lower-box items first, then unseen, then mastered
  const queue = items.slice().sort((a,b) => {
    const ka = itemId(level, cat, a), kb = itemId(level, cat, b);
    const ba = state.boxes[ka] ?? 0, bb = state.boxes[kb] ?? 0;
    return ba - bb;
  });
  // shuffle within same box
  for(let i = queue.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  // re-sort by box value after shuffle
  queue.sort((a,b) => {
    const ka = itemId(level, cat, a), kb = itemId(level, cat, b);
    const ba = state.boxes[ka] ?? 0, bb = state.boxes[kb] ?? 0;
    return ba - bb;
  });
  navigate({name:'study', level, cat, queue, idx:0, flipped:false});
}

function renderStudy(){
  const { level, cat, themeKey, queue, idx } = route;
  const isTheme = !!themeKey;
  const themeDeck = isTheme ? DECKS[themeKey] : null;
  const item = queue[idx];
  if(!item){
    main.innerHTML = `
      <div class="done">
        <h3>DECK CLEARED</h3>
        <p>// you've cycled through every card in this deck. progress saved to local cache. swing back later to consolidate.</p>
        <button class="btn flip" id="againBtn">Re-run deck</button>
      </div>`;
    document.getElementById('againBtn').onclick = () => isTheme ? startTheme(themeKey) : startStudy(level, cat);
    return;
  }

  const meta = isTheme ? null : CATS.find(c=>c.key===cat);
  const displayLevel = isTheme ? (themeDeck.badge || 'MEM') : level;
  const displayCat   = isTheme ? themeDeck.en : meta.en;
  let front = '', back = '';
  let spokenText = '';

  if(cat === 'nouns'){
    spokenText = item.w;
    const STRESSED_A_FEM = new Set(['agua','águila','alma','arma','aula','hacha','hambre','ala','área','ave','aula','asa']);
    let article;
    if(item.g === 'mf') article = 'el/la';
    else if(item.g === 'f' && !STRESSED_A_FEM.has(item.w)) article = 'la';
    else article = 'el';
    front = `
      <div class="meta"><span class="id">${level} · ${meta.en}</span><span class="gender ${item.g==='f'?'f':''}">${item.g.toUpperCase()}</span></div>
      <div class="word-wrap">
        <div class="word">${escapeHtml(item.w)}</div>
        <div class="pron">// ${article} ${escapeHtml(item.w)}</div>
      </div>
      <div class="hint">tap to flip · → know · ← unknown</div>`;
    back = `
      <div class="meta"><span class="id">${level} · TRANSLATION</span><span class="gender ${item.g==='f'?'f':''}">${item.g.toUpperCase()}</span></div>
      <div class="word-wrap">
        <div class="word">${escapeHtml(item.e)}</div>
        <div class="pron">${article} ${escapeHtml(item.w)}</div>
      </div>
      <div class="hint">tap to flip back</div>`;
  } else if(cat === 'verbs'){
    spokenText = item.i;
    front = `
      <div class="meta"><span class="id">${level} · VERB</span><span class="gender">VRB</span></div>
      <div class="word-wrap">
        <div class="word">${escapeHtml(item.i)}</div>
        <div class="pron">// infinitivo</div>
      </div>
      <div class="hint">tap to flip · → know · ← unknown</div>`;
    const parts = item.c.split('/').map(s=>s.trim());
    const pronouns = ['yo','tú','él/ella'];
    const conjRows = parts.length === 3 ? parts.map((p,i)=>`<div class="pn">${pronouns[i]}</div><div class="form">${escapeHtml(p)}</div>`).join('') : `<div class="pn">presente</div><div class="form">${escapeHtml(item.c)}</div>`;
    back = `
      <div class="meta"><span class="id">${level} · TRANSLATION</span><span class="gender">PRS</span></div>
      <div class="word-wrap">
        <div class="word">${escapeHtml(item.e)}</div>
        <div class="conj">${conjRows}</div>
      </div>
      <div class="hint">tap to flip back</div>`;
  } else { // phrases (CEFR) or themed cards — same shape {s, e, n?}
    spokenText = item.s;
    const labelFront = isTheme ? themeDeck.en.toUpperCase() : 'PHRASE';
    const labelBack  = isTheme ? 'TRANSLATION' : 'TRANSLATION';
    const badgeFront = isTheme ? 'MEM' : 'FRS';
    front = `
      <div class="meta"><span class="id">${displayLevel} · ${labelFront}</span><span class="gender">${badgeFront}</span></div>
      <div class="word-wrap">
        <div class="word" style="font-size:clamp(20px,5vw,30px); line-height:1.25;">${escapeHtml(item.s)}</div>
      </div>
      <div class="hint">tap to flip · → know · ← unknown</div>`;
    back = `
      <div class="meta"><span class="id">${displayLevel} · ${labelBack}</span><span class="gender">EN</span></div>
      <div class="word-wrap">
        <div class="phrase-en">${escapeHtml(item.e)}</div>
        ${item.n ? `<div class="phrase-note">// ${escapeHtml(item.n)}</div>` : ''}
      </div>
      <div class="hint">tap to flip back</div>`;
  }

  const remaining = isTheme
    ? remainingThemeLabel(themeKey, queue)
    : remainingLabel(level, cat, queue);
  main.innerHTML = `
    <div class="study">
      <div class="crumb">
        <span class="pill">${escapeHtml(displayLevel)}</span>
        <span class="pill m">${escapeHtml(displayCat)}</span>
      </div>
      <div class="deckhead">
        <span>// Card <span class="count">${idx+1}</span> / ${queue.length}</span>
        <span>${remaining}</span>
      </div>
      <div class="stage">
        <div class="swipe-hint left">← unknown</div>
        <div class="swipe-hint right">know →</div>
        <div class="card${route.flipped ? ' flipped':''}" id="card">
          <div class="face front">
            <button class="speak" id="speakBtn" aria-label="Play audio">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
              </svg>
            </button>
            ${front}
          </div>
          <div class="face back">
            ${back}
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn fail" id="failBtn">No sé</button>
        <button class="btn flip" id="flipBtn">Flip</button>
        <button class="btn pass" id="passBtn">Lo sé</button>
      </div>
    </div>`;

  const card = document.getElementById('card');
  const speakBtn = document.getElementById('speakBtn');
  const flipBtn = document.getElementById('flipBtn');
  const failBtn = document.getElementById('failBtn');
  const passBtn = document.getElementById('passBtn');

  // flip
  const flip = () => {
    route.flipped = !route.flipped;
    card.classList.toggle('flipped', route.flipped);
  };
  card.addEventListener('click', (e) => {
    if(e.target.closest('.speak') || e.target.closest('button')) return;
    flip();
  });
  flipBtn.addEventListener('click', flip);

  // audio
  const playAudio = async (e) => {
    e?.stopPropagation();
    speakBtn.classList.add('playing');
    try {
      await speak(spokenText);
    } finally {
      setTimeout(()=> speakBtn.classList.remove('playing'), 700);
    }
  };
  speakBtn.addEventListener('click', playAudio);
  // auto-play on showing the front
  if(!route.flipped) setTimeout(()=> playAudio(), 250);

  // swipe — only writes inline styles once the gesture clearly becomes a
  // horizontal drag; tap-release always clears them so the .flipped class
  // can drive the back-and-forth flip without an inline override.
  const DRAG_THRESHOLD = 6;
  let sx=0, sy=0, sw=0, sh=0, dragging=false, didDrag=false;
  const clearDragStyles = () => {
    card.style.transform = '';
    card.style.opacity = '';
  };
  card.addEventListener('pointerdown', (e) => {
    if(e.target.closest('button')) return;
    dragging = true; didDrag = false;
    sx = e.clientX; sy = e.clientY; sw = 0; sh = 0;
    card.setPointerCapture(e.pointerId);
  });
  card.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    sw = e.clientX - sx; sh = e.clientY - sy;
    if(!didDrag && Math.abs(sw) < DRAG_THRESHOLD && Math.abs(sh) < DRAG_THRESHOLD) return;
    if(Math.abs(sw) > Math.abs(sh)){
      didDrag = true;
      card.style.transform = `translateX(${sw}px) rotate(${sw/30}deg)` + (route.flipped ? ' rotateY(180deg)' : '');
      card.style.opacity = 1 - Math.min(.4, Math.abs(sw)/600);
    }
  });
  card.addEventListener('pointerup', () => {
    if(!dragging) return;
    dragging = false;
    const dx = sw;
    if(!didDrag){
      // Pure tap — let the click handler do the flip; nothing to clean up.
      sw = sh = 0;
      return;
    }
    card.style.transition = 'transform .25s, opacity .25s';
    if(Math.abs(dx) > 110){
      card.style.transform = `translateX(${dx>0?600:-600}px) rotate(${dx>0?30:-30}deg)` + (route.flipped ? ' rotateY(180deg)' : '');
      card.style.opacity = 0;
      setTimeout(() => {
        if(dx > 0) markKnown(); else markUnknown();
      }, 220);
    } else {
      clearDragStyles();
    }
    sw = sh = 0;
    setTimeout(()=> { card.style.transition = ''; }, 260);
  });
  card.addEventListener('pointercancel', () => {
    dragging = false; didDrag = false;
    clearDragStyles();
  });

  failBtn.addEventListener('click', markUnknown);
  passBtn.addEventListener('click', markKnown);
}

function remainingLabel(level, cat, queue){
  const state = getDeckState(level, cat);
  const total = queue.length;
  const learned = queue.filter(i => (state.boxes[itemId(level, cat, i)] ?? 0) >= 3).length;
  return `${learned}/${total} drilled`;
}

function remainingThemeLabel(themeKey, queue){
  const state = getDeckState('THEME', themeKey);
  const total = queue.length;
  const learned = queue.filter(i => (state.boxes[themeItemId(themeKey, i)] ?? 0) >= 3).length;
  return `${learned}/${total} drilled`;
}

function currentDeckStateAndKey(item){
  if(route.themeKey){
    return { state: getDeckState('THEME', route.themeKey), id: themeItemId(route.themeKey, item) };
  }
  return { state: getDeckState(route.level, route.cat), id: itemId(route.level, route.cat, item) };
}

function markKnown(){
  const { queue, idx } = route;
  const item = queue[idx];
  if(!item) return;
  const { state, id } = currentDeckStateAndKey(item);
  state.boxes[id] = Math.min((state.boxes[id] ?? 0) + 1, 4);
  saveProgress(progress);
  showToast('✓ Marked known', 'pass');
  advance();
}

function markUnknown(){
  const { queue, idx } = route;
  const item = queue[idx];
  if(!item) return;
  const { state, id } = currentDeckStateAndKey(item);
  state.boxes[id] = 0;
  // requeue this item further back
  const itemRef = queue.splice(idx,1)[0];
  const reinsertAt = Math.min(queue.length, idx + 4);
  queue.splice(reinsertAt, 0, itemRef);
  saveProgress(progress);
  showToast('↺ Recycled', 'fail');
  route.flipped = false;
  render();
}

function advance(){
  route.idx += 1;
  route.flipped = false;
  render();
}

function escapeHtml(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ---------- Settings modal ---------- */

const backdrop = document.getElementById('backdrop');
const voiceSel = document.getElementById('voiceSel');
const rateInput = document.getElementById('rateInput');
const rateVal = document.getElementById('rateVal');
const closeBtn = document.getElementById('closeBtn');
const resetBtn = document.getElementById('resetBtn');

function refreshVoiceSelect(){
  loadVoices();
  voiceSel.innerHTML = '<option value="">— Auto (prefer Spain) —</option>' +
    voices.map(v => `<option value="${v.voiceURI}"${v.voiceURI===chosenVoiceURI?' selected':''}>${v.name} · ${v.lang}</option>`).join('');
}
settingsBtn.onclick = () => {
  refreshVoiceSelect();
  rateInput.value = speechRate;
  rateVal.textContent = speechRate.toFixed(2);
  backdrop.classList.add('show');
};
closeBtn.onclick = () => backdrop.classList.remove('show');
backdrop.addEventListener('click', e => { if(e.target === backdrop) backdrop.classList.remove('show'); });
voiceSel.addEventListener('change', e => {
  chosenVoiceURI = e.target.value;
  try { safeStore.setItem('neon-voice', chosenVoiceURI); } catch {}
});
rateInput.addEventListener('input', e => {
  speechRate = parseFloat(e.target.value);
  rateVal.textContent = speechRate.toFixed(2);
  try { safeStore.setItem('neon-rate', String(speechRate)); } catch {}
});
resetBtn.onclick = () => {
  if(!confirm('Reset all progress?')) return;
  try { safeStore.removeItem(PROGRESS_KEY); } catch {}
  progress = {};
  backdrop.classList.remove('show');
  render();
};

/* ---------- Keyboard ---------- */

document.addEventListener('keydown', (e) => {
  if(route.name !== 'study') return;
  if(backdrop.classList.contains('show')) return;
  if(e.key === 'ArrowRight'){ e.preventDefault(); markKnown(); }
  else if(e.key === 'ArrowLeft'){ e.preventDefault(); markUnknown(); }
  else if(e.key === ' ' || e.key === 'Enter'){
    e.preventDefault();
    const card = document.getElementById('card');
    route.flipped = !route.flipped;
    card?.classList.toggle('flipped', route.flipped);
  } else if(e.key.toLowerCase() === 's'){
    e.preventDefault();
    document.getElementById('speakBtn')?.click();
  } else if(e.key === 'Escape'){
    navigate({name:'home'});
  }
});

/* ---------- Boot ---------- */

window.addEventListener('error', (e) => {
  const main = document.getElementById('main');
  if(main){
    main.innerHTML = `<div class="done"><h3>// SYS ERROR</h3><p style="text-align:left; font-size:11px; color:#ff3860; word-break:break-word;">${escapeHtml(String(e.message || e))}<br><br>${escapeHtml(String(e.filename || ''))}:${e.lineno || ''}:${e.colno || ''}</p></div>`;
  }
});

try {
  navigate({name:'home'});
} catch(err) {
  const main = document.getElementById('main');
  if(main){
    main.innerHTML = `<div class="done"><h3>// BOOT ERROR</h3><p style="text-align:left; font-size:11px; color:#ff3860;">${(err && err.message) || String(err)}</p></div>`;
  }
}
</script>
